# One box, both front-ends, from the shared content/ source:
#
#   docker compose up -d --build
#
# Prereq: move the host's own sshd off :22 first (e.g. to 2200) and firewall it,
# or the tui service can't bind the public SSH port.
#
# Web alternative: comment out the `web` service and its caddy-* volumes below,
# and deploy web/ to GitHub Pages instead (see .github/workflows/deploy.yml).
# The site then lives on Pages' CDN; only the SSH TUI is self-hosted here.

services:
  tui:
    build:
      context: .
      dockerfile: tui/Dockerfile
    image: ghcr.io/monkeymonk/szych-tui:latest
    restart: unless-stopped
    ports:
      - "22:2222" # public SSH face; the host's own sshd must live elsewhere
    volumes:
      - ssh-hostkey:/data/.ssh # stable host key -> no client warnings on redeploy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    pids_limit: 256

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: ghcr.io/monkeymonk/szych-web:latest
    restart: unless-stopped
    environment:
      # Caddy auto-HTTPS in prod; override SITE_ADDRESS=:8080 for local runs.
      - SITE_ADDRESS=${SITE_ADDRESS:-stephan.zych.be}
      # Subdomain Caddy reverse-proxies to Umami. Unset locally -> the Caddyfile
      # falls back to :8081 (no cert); prod exports ANALYTICS_ADDRESS=analytics.zych.be.
      - ANALYTICS_ADDRESS
      # Basic-auth credentials for the private /_stats dashboard, read from the
      # shell that runs compose. In CI they're forwarded from GitHub secrets by
      # .github/workflows/deploy.yml; for a local run, export them inline:
      #   STATS_USER=you \
      #   STATS_AUTH_HASH="$(docker run --rm caddy:2-alpine caddy hash-password --plaintext pw)" \
      #   docker compose up -d
      - STATS_USER
      - STATS_AUTH_HASH
    ports:
      - "80:8080" # Caddy listens unprivileged inside; host exposes the standard ports
      - "443:8443"
    volumes:
      - caddy-data:/data # provisioned certificates persist here
      - caddy-config:/config
      - analytics:/logs # anonymized access log in; GoAccess report.html out
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL # runs as non-root on high ports — no NET_BIND_SERVICE needed
    security_opt:
      - no-new-privileges:true

  # Turns Caddy's anonymized access log into a static HTML dashboard, served by
  # Caddy at /_stats (behind basic-auth). Runs as the same uid 1000 as the web
  # service so it shares the /logs volume without any chown/CAP_CHOWN.
  goaccess:
    image: allinurl/goaccess:1.9.4
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      - web # let web seed the /logs volume ownership first
    environment:
      - HOME=/tmp # no home dir for uid 1000; keep GoAccess scratch off the rootfs
    entrypoint: ["/bin/sh", "-c"]
    # Poll fast until the access log first appears (avoids a blank /_stats on a
    # cold deploy), then regenerate the report every 5 minutes.
    command:
      - 'while true; do
         if [ -f /logs/access.log ]; then
         goaccess /logs/access.log -o /logs/report.html --log-format=CADDY
         --html-report-title="stephan.zych.be" --anonymize-ip --no-global-config;
         sleep 300;
         else sleep 5; fi;
         done'
    volumes:
      - analytics:/logs
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    pids_limit: 64

  # Self-hosted, cookieless analytics shared by all three sites (this one plus
  # the two GitHub Pages sites, which can't use the Caddy-log path). Caddy
  # reverse-proxies analytics.zych.be -> this container; it has no public port.
  # Secrets come from the shell running compose (GitHub secrets in CI):
  #   UMAMI_DB_PASSWORD  Postgres password (shared with umami-db below)
  #   UMAMI_APP_SECRET   session/JWT signing secret
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest # pin to a digest to match the other images
    restart: unless-stopped
    depends_on:
      umami-db:
        condition: service_healthy
    environment:
      - DATABASE_TYPE=postgresql
      - DATABASE_URL=postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      - APP_SECRET=${UMAMI_APP_SECRET}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 384m
    pids_limit: 256

  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    pids_limit: 256

volumes:
  ssh-hostkey:
  caddy-data:
  caddy-config:
  analytics: # shared access log + generated GoAccess report
  umami-db-data: # Umami's Postgres data
