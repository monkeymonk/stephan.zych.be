# One box, both front-ends, from the shared content/ source:
#
#   docker compose up -d --build
#
# Prereq: move the host's own sshd off :22 first (e.g. to 2200) and firewall it,
# or the tui service can't bind the public SSH port.
#
# Web alternative: comment out the `web` service and its caddy-* volumes below,
# and deploy web/ to GitHub Pages instead (see .github/workflows/deploy.yml).
# The site then lives on Pages' CDN; only the SSH TUI is self-hosted here.

services:
  tui:
    build:
      context: .
      dockerfile: tui/Dockerfile
    image: ghcr.io/monkeymonk/szych-tui:latest
    restart: unless-stopped
    ports:
      - "22:2222" # public SSH face; the host's own sshd must live elsewhere
    volumes:
      - ssh-hostkey:/data/.ssh # stable host key -> no client warnings on redeploy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    pids_limit: 256

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: ghcr.io/monkeymonk/szych-web:latest
    restart: unless-stopped
    environment:
      SITE_ADDRESS: stephan.zych.be # Caddy auto-HTTPS; set to :8080 for local runs
    ports:
      - "80:8080" # Caddy listens unprivileged inside; host exposes the standard ports
      - "443:8443"
    volumes:
      - caddy-data:/data # provisioned certificates persist here
      - caddy-config:/config
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL # runs as non-root on high ports — no NET_BIND_SERVICE needed
    security_opt:
      - no-new-privileges:true

volumes:
  ssh-hostkey:
  caddy-data:
  caddy-config:
